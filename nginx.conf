# Static serving for the Eurêka SPA + PWA.
# Loaded as /etc/nginx/conf.d/default.conf, so it inherits the global
# `include /etc/nginx/mime.types;` (correct MIME for js/css/woff2/png/etc.).

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Lightweight compression for text assets.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json;

    # --- PWA freshness ---------------------------------------------------------
    # The service worker, its registration shim and the Workbox runtime must never
    # be cached: a stale service worker would strand users on an old build.
    location ~* ^/(sw\.js|registerSW\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache";
    }

    # Web manifest: force the correct MIME type and keep it fresh.
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header   Cache-Control "no-cache";
    }

    # --- Hashed build assets ---------------------------------------------------
    # Everything Vite emits under /assets/ is content-hashed, so cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # --- App shell + SPA fallback ----------------------------------------------
    # index.html stays fresh so new builds (and the new asset hashes) are seen
    # immediately; unknown routes fall back to the shell.
    location / {
        add_header Cache-Control "no-cache";
        try_files  $uri /index.html;
    }
}
