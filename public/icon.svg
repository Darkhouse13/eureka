    <path d="M70 40 C100 40 108 66 104 86 C100 108 86 120 70 120 C54 120 40 108 36 86 C32 66 40 40 70 40 Z" fill="#FBE9C4" stroke="#0E1430" stroke-width="2.5"/>
    <path d="M70 80 C79 80 86 87 86 96 C86 107 79 113 70 113 C61 113 54 107 54 96 C54 87 61 80 70 80Z" fill="#fff8ec"/>
    <ellipse cx="57" cy="74" rx="5.5" ry="7" fill="#1B2350"/>
    <ellipse cx="83" cy="74" rx="5.5" ry="7" fill="#1B2350"/>
    <circle cx="59" cy="71" r="1.8" fill="#fff"/>
    <circle cx="85" cy="71" r="1.8" fill="#fff"/>
    <path d="M65 89 H75 L70 96 Z" fill="#1B2350"/>
