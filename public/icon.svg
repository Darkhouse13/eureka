<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Eurêka">
  <defs>
    <radialGradient id="midnight" cx="32%" cy="22%" r="95%">
      <stop offset="0" stop-color="#1c2452"/>
      <stop offset="0.55" stop-color="#0E1430"/>
      <stop offset="1" stop-color="#080B1F"/>
    </radialGradient>
  </defs>

  <!-- fond de minuit, plein bord (compatible masque) -->
